<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
<title id="title">HRS Grand Hotel Emblem</title>
<desc id="desc">A refined abstract tower-and-hall emblem for HRS Grand Hotel.</desc>
<defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff0bf"/>
    <stop offset="0.32" stop-color="#d6a85a"/>
    <stop offset="0.68" stop-color="#9b6c2a"/>
    <stop offset="1" stop-color="#f4d58a"/>
  </linearGradient>
  <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#16213c"/>
    <stop offset="1" stop-color="#060a12"/>
  </linearGradient>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
  </filter>
</defs>
<rect width="200" height="200" rx="42" fill="url(#ink)"/>
<circle cx="100" cy="100" r="78" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.88"/>
<path filter="url(#soft)" d="M100 28 L113 59 L129 66 L129 88 L151 103 L151 145 L49 145 L49 103 L71 88 L71 66 L87 59 Z" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linejoin="round"/>
<path d="M100 45 L100 87" stroke="#f7deb0" stroke-width="4" stroke-linecap="round" opacity=".9"/>
<circle cx="100" cy="73" r="11" fill="none" stroke="#f7deb0" stroke-width="4"/>
<path d="M82 93 H118" stroke="#f7deb0" stroke-width="5" stroke-linecap="round"/>
<path d="M66 111 H134" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" opacity=".95"/>
<path d="M76 145 V119 M100 145 V116 M124 145 V119" stroke="#f7deb0" stroke-width="5" stroke-linecap="round" opacity=".88"/>
<path d="M56 160 H144" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
<text x="100" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="3.5" fill="#f4d58a">HRS</text>
</svg>